openapi: 3.1.0
info:
  title: Cadence API
  version: 0.1.0
  description: |
    Backend contract for the Cadence hackathon MVP (see FRD.md for requirement IDs).
    Design decision: a single action-envelope endpoint (`POST /api/state`) mutates state
    and every response returns the FULL AppState — both surfaces render from one poll
    (FR-6.2/6.3). RESTful per-resource routes are the production path, not built here.

    Safety invariants encoded in the implementation (not expressible in schema, but
    normative): medical coach replies carry `sourceProtocolId` referencing a
    clinician-authored protocol card (FR-2.2); escalation thresholds are evaluated in
    plain code, never by the model (FR-4.1); live-mode AI failures fall back to
    fixtures silently (FR-6.1).
servers:
  - url: http://localhost:3001
    description: Local API (web dev server proxies /api and /health here)

paths:
  /health:
    get:
      summary: Liveness + mode probe
      operationId: getHealth
      responses:
        '200':
          description: Service is up
          content:
            application/json:
              schema:
                type: object
                required: [status, aiMode, model]
                properties:
                  status: { type: string, const: ok }
                  aiMode: { $ref: '#/components/schemas/AiMode' }
                  model: { type: string }

  /api/state:
    get:
      summary: Read full app state (FR-6.2) — polled ~1s by both surfaces (FR-4.3)
      operationId: getState
      responses:
        '200':
          description: Current state
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ClientState' }
    post:
      summary: Mutate state via action envelope (FR-6.3)
      operationId: postStateAction
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/StateAction' }
      responses:
        '200':
          description: Action applied; full updated state returned
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ClientState' }
        '400':
          description: Missing/unknown action or missing required field
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiError' }
        '500':
          description: Action failed (unexpected)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiError' }

  /api/chat:
    post:
      summary: Raw chat passthrough (scaffold legacy — not used by the demo flow)
      operationId: postChat
      deprecated: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [messages]
              properties:
                messages:
                  type: array
                  items: { $ref: '#/components/schemas/ChatMessage' }
      responses:
        '200':
          description: Model reply
          content:
            application/json:
              schema:
                type: object
                required: [message, model]
                properties:
                  message: { $ref: '#/components/schemas/ChatMessage' }
                  model: { type: string }

components:
  schemas:
    AiMode:
      type: string
      enum: [fixture, live]

    ApiError:
      type: object
      required: [error]
      properties:
        error: { type: string }

    ChatMessage:
      type: object
      required: [role, content]
      properties:
        role: { type: string, enum: [system, user, assistant] }
        content: { type: string }

    Severity:
      type: string
      enum: [mild, moderate, severe]

    Patient:
      type: object
      required: [id, name, condition, medication, baselineLabs, goals, coachName]
      properties:
        id: { type: string }
        name: { type: string }
        condition: { type: string }
        medication:
          type: object
          required: [name, currentDose, schedule, titrationPlan]
          properties:
            name: { type: string }
            currentDose: { type: string }
            schedule: { type: string }
            titrationPlan:
              type: array
              items:
                type: object
                required: [label, dose]
                properties:
                  label: { type: string }
                  dose: { type: string }
                  note: { type: string }
        baselineLabs:
          type: object
          required: [a1c, lipids, weightKg]
          properties:
            a1c: { type: number }
            lipids: { type: string }
            weightKg: { type: number }
        goals:
          type: array
          items: { type: string }
        coachName: { type: string }

    CarePlan:
      type: object
      description: >
        FR-1.2/1.3. `constraints` are hard rails enforced in code after generation
        (clamped, never shown out-of-rails).
      required:
        [patientId, weekNumber, proteinTargetG, stepTarget, calorieRange,
         dailyActions, titrationTimeline, summary, generatedAt, constraints]
      properties:
        patientId: { type: string }
        weekNumber: { type: integer }
        proteinTargetG: { type: number }
        stepTarget: { type: number }
        calorieRange:
          type: object
          required: [min, max]
          properties:
            min: { type: number }
            max: { type: number }
        dailyActions:
          type: array
          items:
            type: object
            required: [id, title, detail, when]
            properties:
              id: { type: string }
              title: { type: string }
              detail: { type: string }
              when: { type: string }
        titrationTimeline:
          type: array
          items:
            type: object
            required: [label, dose]
            properties:
              label: { type: string }
              dose: { type: string }
              note: { type: string }
        summary: { type: string }
        generatedAt: { type: string, format: date-time }
        constraints:
          type: object
          required: [calorieFloor, proteinFloor, maxLossRatePerWeekKg]
          properties:
            calorieFloor: { type: number }
            proteinFloor: { type: number }
            maxLossRatePerWeekKg: { type: number }

    LogEntry:
      type: object
      required: [id, patientId, type, payload, timestamp, reviewed]
      properties:
        id: { type: string }
        patientId: { type: string }
        type: { type: string, enum: [injection, meal, symptom, biomarker] }
        payload: { type: object, additionalProperties: true }
        timestamp: { type: string, format: date-time }
        reviewed: { type: boolean }
        aiFeedback: { type: string }

    GameState:
      type: object
      required: [streaks, points, level, activeQuests, nonScaleVictories, streakRepairUsed]
      properties:
        streaks:
          type: object
          required: [injection, logging]
          properties:
            injection: { type: integer }
            logging: { type: integer }
        points: { type: integer }
        level: { type: integer }
        activeQuests:
          type: array
          items:
            type: object
            required: [id, title, progress, goal]
            properties:
              id: { type: string }
              title: { type: string }
              progress: { type: number }
              goal: { type: number }
        nonScaleVictories:
          type: array
          items: { type: string }
        streakRepairUsed: { type: boolean }

    CoachMessage:
      type: object
      description: >
        FR-2.2: when the reply is medical, `sourceProtocolId` MUST be present and
        reference a clinician-authored protocol card. Absence of it on a medical
        topic means the coach escalated instead of answering (FR-2.4).
      required: [id, threadId, role, text, timestamp]
      properties:
        id: { type: string }
        threadId: { type: string }
        role: { type: string, enum: [patient, coach, rd] }
        text: { type: string }
        sourceProtocolId: { type: string }
        timestamp: { type: string, format: date-time }

    Escalation:
      type: object
      description: FR-4.1/4.2 — the RD queue row. Created only by code-level threshold checks.
      required: [id, patientId, reason, triggeredBy, aiSnapshot, status, createdAt]
      properties:
        id: { type: string }
        patientId: { type: string }
        reason: { type: string }
        triggeredBy: { type: string, description: 'LogEntry id or CoachMessage id' }
        aiSnapshot: { type: string }
        status: { type: string, enum: [open, acknowledged, resolved] }
        createdAt: { type: string, format: date-time }
        clinicianNote: { type: string }

    ClientState:
      type: object
      description: Full app state (FR-6.2) plus the server's AI mode.
      required:
        [onboarded, patient, plan, logs, game, coachThread, escalations,
         latestReview, updatedAt]
      properties:
        onboarded: { type: boolean }
        patient: { $ref: '#/components/schemas/Patient' }
        plan:
          oneOf:
            - { $ref: '#/components/schemas/CarePlan' }
            - { type: 'null' }
        logs:
          type: array
          items: { $ref: '#/components/schemas/LogEntry' }
        game: { $ref: '#/components/schemas/GameState' }
        coachThread:
          type: array
          items: { $ref: '#/components/schemas/CoachMessage' }
        escalations:
          type: array
          items: { $ref: '#/components/schemas/Escalation' }
        latestReview:
          oneOf:
            - { type: string }
            - { type: 'null' }
        updatedAt: { type: number }
        aiMode: { $ref: '#/components/schemas/AiMode' }

    StateAction:
      oneOf:
        - $ref: '#/components/schemas/OnboardAction'
        - $ref: '#/components/schemas/CoachAction'
        - $ref: '#/components/schemas/LogAction'
        - $ref: '#/components/schemas/ResolveAction'
        - $ref: '#/components/schemas/ResetAction'
      discriminator:
        propertyName: action

    OnboardAction:
      type: object
      description: FR-1.2 — generate the week-one plan.
      required: [action]
      properties:
        action: { type: string, const: onboard }

    CoachAction:
      type: object
      description: FR-2.1 — patient message to the coach.
      required: [action, text]
      properties:
        action: { type: string, const: coach }
        text: { type: string, minLength: 1 }

    LogAction:
      type: object
      description: FR-3.1 — create a log entry; symptom logs also run protocol matching (FR-4.1).
      required: [action, type]
      properties:
        action: { type: string, const: log }
        type: { type: string, enum: [injection, meal, symptom, biomarker] }
        payload: { type: object, additionalProperties: true }
        severity: { $ref: '#/components/schemas/Severity' }

    ResolveAction:
      type: object
      description: FR-4.4 — clinician resolves an escalation; note lands in patient thread as rd message.
      required: [action, escalationId]
      properties:
        action: { type: string, const: resolve }
        escalationId: { type: string }
        note: { type: string }

    ResetAction:
      type: object
      description: FR-6.4 — restore seeded state instantly.
      required: [action]
      properties:
        action: { type: string, const: reset }
